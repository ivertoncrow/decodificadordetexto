<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/style.css" />
    <title>Decodificador</title>
  </head>
  <body>
    <header>
      <img src="./src/Criptografia.png" alt="logo" />
    </header>

    <main>
      <section class="criptografia">
        <textarea
          id="input"
          placeholder="Digite com letras minúsculas e sem acento"
        ></textarea>
        <div class="div-buttons">
          <button class="button" id="button-cripto">Criptografar</button>
          <button class="button" id="button-descripto">Descriptografar</button>
        </div>
      </section>

      <section class="descriptografia">
        <textarea id="output" placeholder="Solução" readonly></textarea>
        <div class="div-copy">
          <button class="button" id="button-copy">Copiar</button>
        </div>
      </section>
    </main>

    <footer>
      <p>Feito com ❤️ by Iverton Mello &copy;2022</p>
    </footer>

    <script src="./script/script.js" defer></script>
  </body>
</html>
